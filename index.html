<script>
// MATRIX
const MATRIX_CHARS = ['0','1','A','U','T','H','X','9','K','Σ','Λ','7','N','O','D','E','S','Y','S','Q','R','I','V','M','C','8','2','5','F','P'];

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];

for(let x = 0; x < columns; x++) {
  drops[x] = 1;
}

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#0f0";
  ctx.font = fontSize + "px monospace";

  for(let i = 0; i < drops.length; i++) {
    const text = MATRIX_CHARS[Math.floor(Math.random() * MATRIX_CHARS.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }

    drops[i]++;
  }
}

setInterval(draw, 33);

// ANALIZADOR
async function analizar(){

  const email = document.getElementById("email").value;
  const username = document.getElementById("username").value;

  if(!email || !username){
    alert("Introduce email y usuario");
    return;
  }

  try{
    const res = await fetch("https://abrochat-backend.onrender.com/analyze", {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        username: username,
        platform: "instagram"
      })
    });

    const data = await res.json();

    alert(data.result || data.error);

  }catch(e){
    alert("Error conectando con IA");
  }
}

// JARVIS VOZ
function jarvis(){

  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "es-ES";

  recognition.start();

  recognition.onresult = async function(event){

    const texto = event.results[0][0].transcript;

    try{
      const res = await fetch("https://abrochat-backend.onrender.com/analyze", {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body: JSON.stringify({
          username: texto,
          platform: "instagram"
        })
      });

      const data = await res.json();

      hablar(data.result || "Sin respuesta");

    }catch(e){
      hablar("Error en el sistema");
    }
  };
}

function hablar(texto){
  const speech = new SpeechSynthesisUtterance(texto);
  speech.lang = "es-ES";
  speech.pitch = 0.8;
  speech.rate = 0.9;
  speechSynthesis.speak(speech);
}
</script>

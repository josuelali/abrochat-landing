<!DOCTYPE html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

/* MATRIX */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* CONTENIDO */
.container {
  margin-top: 100px;
}

/* INPUTS */
input {
  padding: 15px;
  border-radius: 10px;
  border: none;
  width: 250px;
  margin: 10px;
}

/* BOTONES */
button {
  padding: 15px 30px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  background: linear-gradient(45deg, #6a00ff, #00c3ff);
  color: white;
  margin: 10px;
  transition: all 0.3s ease;
  box-shadow: 0 0 10px rgba(0,195,255,0.5);
}

button:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 0 20px rgba(106,0,255,0.8);
}

/* RESULTADO */
#resultado {
  display: none;
  margin: 30px auto;
  padding: 20px;
  max-width: 700px;
  background: rgba(0,0,0,0.6);
  border-radius: 15px;
  text-align: left;
  white-space: pre-line;
}

/* AFILIADOS */
.afiliados {
  margin-top: 20px;
}

.afiliados a {
  display: inline-block;
  margin: 6px;
  padding: 8px 14px;
  border-radius: 10px;
  background: rgba(255,255,255,0.08);
  color: #00c3ff;
  font-size: 13px;
  text-decoration: none;
  transition: 0.3s;
}

.afiliados a:hover {
  background: rgba(0,195,255,0.2);
  transform: scale(1.05);
}

/* BOTÓN SISTEMA MAESTRO */
.master-btn {
  display: inline-block;
  margin-top: 20px;
  padding: 14px 25px;
  border-radius: 12px;
  background: linear-gradient(90deg, #00ff9f, #00c3ff);
  color: black;
  font-weight: bold;
  text-decoration: none;
  box-shadow: 0 0 15px rgba(0,255,159,0.6);
  transition: 0.3s;
  position: relative;
}

.master-btn:hover {
  transform: scale(1.07);
  box-shadow: 0 0 25px rgba(0,255,159,1);
}

.master-btn::before {
  content: "⇩";
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  color: #00ff9f;
  animation: floatArrow 1s infinite;
}

@keyframes floatArrow {
  0% { transform: translate(-50%, 0); }
  50% { transform: translate(-50%, 6px); }
  100% { transform: translate(-50%, 0); }
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

  <h1>Convierte ideas en ingresos con IA</h1>

  <input id="email" placeholder="Tu email">
  <input id="username" placeholder="@usuario o web">

  <br>

  <!-- BOTONES PRINCIPALES -->

    Que lo haga Jarvis

  <!-- RESULTADO -->
  <div id="resultado"></div>

  <!-- AFILIADOS -->

    <a href="https://pictory.ai?ref=joshue-cabello-rosa72" target="_blank">🎬 Videos IA</a>
    <a href="https://www.hostinger.com/es?REFERRALCODE=DZOJOSUECS4D" target="_blank">🌐 Hosting</a>
    <a href="https://josuecabellorosa83.systeme.io/30a703c4" target="_blank">🚀 Sistema IA</a>

<script>

// ==========================
// MATRIX
// ==========================
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = [];

for (let x = 0; x < columns; x++) drops[x] = 1;

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#0F0";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(draw, 33);

// ==========================
// ANALIZAR PERFIL
// ==========================
async function analizarPerfil() {

  const email = document.getElementById("email").value;
  const username = document.getElementById("username").value;

  if (!email || !username) {
    alert("Completa los campos");
    return;
  }

  const resultadoDiv = document.getElementById("resultado");
  resultadoDiv.style.display = "block";
  resultadoDiv.innerHTML = "Analizando...";

  try {

    const response = await fetch("https://abrochat-backend.onrender.com/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email,
        username,
        platform: "instagram"
      })
    });

    const data = await response.json();

    if(data.paywall){

      resultadoDiv.innerHTML = `
        <h3>🔒 Desbloquea el análisis completo</h3>

        <button onclick="window.open('https://buy.stripe.com/9B66oH4B18MZ6DN4pVabK05')">
          Básico 3,99€
        </button>

        <button onclick="window.open('https://buy.stripe.com/3cIaEX2sT2oB6DNbSnabK03')">
          Plus 6,99€
        </button>

        <button onclick="window.open('https://buy.stripe.com/00wcN57Nd4wJe6f9KfabK04')">
          PRO 29,99€/mes
        </button>
      `;
      return;
    }

    resultadoDiv.innerHTML = `<div>${data.result}</div>`;

  } catch {
    resultadoDiv.innerHTML = "Error conectando con IA";
  }
}

</script>

</body>
</html>

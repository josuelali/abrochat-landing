<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Abrochat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

/* MATRIX */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* CONTENIDO */
.container {
  margin-top: 100px;
}

input {
  padding: 15px;
  border-radius: 10px;
  border: none;
  width: 250px;
  margin: 10px;
}

button {
  padding: 15px 25px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  background: linear-gradient(45deg, #6a00ff, #00c3ff);
  color: white;
  margin: 10px;
}

/* RESULTADO */
#resultado {
  display: none;
  margin: 30px auto;
  padding: 20px;
  max-width: 700px;
  background: rgba(0,0,0,0.7);
  border-radius: 15px;
  text-align: left;
  white-space: pre-line;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

  <h1>Convierte ideas en ingresos con IA</h1>

  <input id="email" placeholder="Tu email">
  <input id="username" placeholder="@usuario">

  <br>

  <button onclick="analizarPerfil()">Analizar perfil</button>
  <button onclick="hablarJarvis()">Hablar con Jarvis</button>

  <div id="resultado"></div>

</div>

<script>

// ==========================
// GUARDAR EMAIL
// ==========================
const savedEmail = localStorage.getItem("email");
if(savedEmail){
  document.getElementById("email").value = savedEmail;
}

// ==========================
// MATRIX
// ==========================
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = [];

for (let x = 0; x < columns; x++) drops[x] = 1;

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#0F0";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(draw, 33);

// ==========================
// ANALIZAR PERFIL
// ==========================
async function analizarPerfil() {

  const email = document.getElementById("email").value;
  const username = document.getElementById("username").value;

  if (!email || !username) {
    alert("Completa todos los campos");
    return;
  }

  localStorage.setItem("email", email);

  const resultadoDiv = document.getElementById("resultado");
  resultadoDiv.style.display = "block";
  resultadoDiv.innerText = "Analizando...";

  try {

    const response = await fetch("https://abrochat-backend.onrender.com/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: email,
        username: username,
        platform: "instagram"
      })
    });

    const data = await response.json();

    // ==========================
    // PAYWALL
    // ==========================
    if(data.paywall){

      resultadoDiv.innerHTML = `
      <h2 style="color:#ff4d4d;">🚨 Has agotado tus análisis gratuitos</h2>
      <p>Tu perfil tiene oportunidades claras de crecimiento y monetización.</p>

      <hr>

      <h3>🔥 Elige cómo avanzar:</h3>

      <a href="https://buy.stripe.com/9B66oH4B18MZ6DN4pVabK05" target="_blank">
        <button>Informe básico 3,99€</button>
      </a>

      <a href="https://buy.stripe.com/3cIaEX2sT2oB6DNbSnabK03" target="_blank">
        <button style="background:purple;">Informe Plus 6,99€</button>
      </a>

      <a href="https://buy.stripe.com/00wcN57Nd4wJe6f9KfabK04" target="_blank">
        <button style="background:orange;">PRO 29,99€/mes</button>
      </a>

      <p style="color:#00ff99;">+1.200 usuarios ya están mejorando sus perfiles</p>
      `;

      return;
    }

    // ==========================
    // RESULTADO NORMAL
    // ==========================
    if(data.result){

      resultadoDiv.innerHTML = `
      <h3 style="color:#00ffcc;">✔ Análisis generado</h3>
      <p>${data.result}</p>

      <hr>

      <h4>🚀 Mejora continua automática</h4>

      <a href="https://buy.stripe.com/00wcN57Nd4wJe6f9KfabK04" target="_blank">
        <button style="background:orange;">Activar PRO</button>
      </a>
      `;

    } else {
      resultadoDiv.innerText = data.error || "Error desconocido";
    }

  } catch (error) {
    resultadoDiv.innerText = "Error conectando con IA";
  }
}

// ==========================
// JARVIS VOZ + RESPUESTA IA
// ==========================
function hablarJarvis() {

  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "es-ES";

  recognition.start();

  recognition.onresult = async function(event) {

    const texto = event.results[0][0].transcript;

    const resultadoDiv = document.getElementById("resultado");
    resultadoDiv.style.display = "block";
    resultadoDiv.innerText = "Pensando...";

    try {

      const response = await fetch("https://abrochat-backend.onrender.com/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: texto
        })
      });

      const data = await response.json();

      resultadoDiv.innerText = data.reply || "Sin respuesta";

      const speech = new SpeechSynthesisUtterance(data.reply);
      speech.lang = "es-ES";
      speech.rate = 0.9;
      speech.pitch = 0.8;

      speechSynthesis.speak(speech);

    } catch {
      resultadoDiv.innerText = "Error con Jarvis";
    }
  };

  recognition.onerror = function() {
    alert("Error en micrófono");
  };
}

</script>

</body>
</html>
